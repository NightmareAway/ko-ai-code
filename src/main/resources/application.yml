spring:
  application:
    name: ko-ai-code-backend
    # session 配置
    session:
      store-type: redis
      # session 30 天过期
      timeout: 2592000
  # redis
  data:
    redis:
      host: localhost
      port: 6379
      password:
      ttl: 3600
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ko_ai_code_database
    username: root
    password: 123456
  profiles:
    active: local
server:
  port: 8123
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000
# springdoc-openapi
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
    path: /swagger-ui.html
  group-configs:
    - group: 'default'
      packages-to-scan: cn.ko_ai_code.com.koaicode.controller

