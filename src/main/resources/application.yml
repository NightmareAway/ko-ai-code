spring:
  application:
    name: ko-ai-code-backend
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ko_ai_code_database
    username: root
    password: 123456
  profiles:
    active: local
server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: cn.ko_ai_code.com.koaicode.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

